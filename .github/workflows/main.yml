---
name: Test, Build and Deploy My Documents
on: # yamllint disable-line rule:truthy
  push:
    # execute when pushing only branches, not tags
    branches:
      - '**'
      # avoid infinite loop for auto created PRs
      - '!update/pre-commit-*'
    tags:
      - '*'
  workflow_dispatch:

# cancel previous build if several pushes
concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Forces Node 24 runtime
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - uses: crazy-max/ghaction-import-gpg@v7
        if: ${{ success() }}
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - uses: actions/create-github-app-token@v3.1.1
        if: ${{ success() }}
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: generate pre-commit config for GitHub
        if: ${{ success() }}
        run: .github/preCommitGeneration.sh

      - name: Transform pre-commit config for GitHub
        if: ${{ success() }}
        run: .github/preCommitGeneration.sh

      - name: Run pre-commit
        uses: j178/prek-action@v2
        id: preCommit
        with:
          extra-args: >-
            -c .pre-commit-config-github.yaml -a --hook-stage manual

      - name: MegaLinter
        id: ml
        if: ${{ always() }}
        # You can override MegaLinter flavor used to have faster performances
        # More info at https://megalinter.io/flavors/
        uses: oxsecurity/megalinter/flavors/documentation@v9
        # All available variables are described in documentation
        # https://megalinter.io/configuration/
        env:
          # Validates all source when push on master,
          # else just the git diff with master.
          # Override with true if you always want to lint all sources
          VALIDATE_ALL_CODEBASE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MEGALINTER_CONFIG: .mega-linter-githubAction.yml
          CI_MODE: 1

      - name: Upload MegaLinter artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: MegaLinter reports
          retention-days: 2
          overwrite: true
          path: |
            megalinter-reports
            mega-linter.log

      - name: Create Pull Request
        id: cpr
        if: >
          (
            github.event_name == 'push' ||
            github.event.pull_request.head.repo.full_name ==
            github.repository
          ) && (
            steps.preCommit.conclusion == 'failure' ||
            steps.ml.conclusion == 'failure'
          ) && !contains(github.event.head_commit.message, 'skip fix')
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.generate-token.outputs.token }}
          committer: fchastanet <fchastanet@gmail.com>
          branch: update/pre-commit-fixes-${{ env.branch_name }}
          delete-branch: true
          title: lint fixes
          commit-message: Auto-update lint fixes
          body: |
            some auto fixes have been generated during pre-commit run
          labels: pre-commit-fixes

      - name: Print Pull request created
        if: |
          steps.cpr.outputs.pull-request-number &&
          steps.cpr.conclusion == 'success'
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"

  build-deploy:
    needs:
      - lint
    # Only run if the lint job succeeded, and if the push is on master branch or if it's a workflow dispatch event
    if: ${{ needs.lint.result == 'success' && (github.ref == 'refs/heads/master') }}
    uses: fchastanet/my-documents/.github/workflows/build-site-action.yml@master
    with:
      site-name: 'my-documents'
    permissions:
      contents: read
      pages: write
      id-token: write
