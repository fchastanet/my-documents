---
name: Build and Deploy Site

# This is a reusable workflow that can be called from other repositories
# It builds a Hugo site and deploys it to GitHub Pages
on:
  workflow_call:
    inputs:
      site-name:
        description: 'Name of the site to build (used for config file lookup)'
        required: true
        type: string
      site-dir:
        description: 'Directory containing the site content (default: .)'
        required: false
        type: string
        default: '.'
      checkout-repo:
        description: 'Repository to checkout content from (owner/repo format, if different from caller)'
        required: false
        type: string
        default: ''
      checkout-ref:
        description: 'Git reference to checkout (branch, tag, or commit SHA)'
        required: false
        type: string
        default: 'master'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Forces Node 24 runtime
    steps:
      - name: Checkout orchestrator (my-documents)
        uses: actions/checkout@v6
        with:
          repository: fchastanet/my-documents
          fetch-depth: 0

      - name: Checkout content (${{ inputs.site-name }})
        if: inputs.checkout-repo != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.checkout-repo }}
          path: _site-content
          ref: ${{ inputs.checkout-ref }}
          fetch-depth: 0

      # docker buildx might be needed for consumers of this action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Hugo
        uses: denmette/actions-hugo@v1
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Cache Hugo modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/hugo_modules
            go.mod
            go.sum
          key: ${{ runner.os }}-hugo-modules-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo-modules-

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Dart Sass
        run: npm install -g sass

      - name: Setup yq
        uses: vegardit/gha-setup-yq@v1
        with:
          yq-version: v4.52.4

      - name: Build site for ${{ inputs.site-name }}
        run: |
          BUILD=1 .github/scripts/build-site.sh \
            "${{ inputs.site-dir }}" \
            "${{ inputs.site-name }}" \
            "build"

      - uses: cloudflare/wrangler-action@v3
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.81.1"
          command: |
            pages project list
            pages deploy build/${{ inputs.site-name }}/public/ --project-name=${{ inputs.site-name }} --branch=master --commit-dirty=true

      - name: Get short SHA of latest commit in PR
        id: short-sha
        if: github.event_name == 'pull_request' && success()
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "short_sha=${HEAD_SHA:0:7}" >> "${GITHUB_OUTPUT}"

      - name: Comment on PR
        uses: thollander/actions-comment-pull-request@v3
        if: github.event_name == 'pull_request' && success()
        with:
          message: |
            ## Deployed ${{ inputs.site-name }} with Cloudflare Pages

            | **Latest commit:** | `${{ steps.short-sha.outputs.short_sha }}` |
            |:-|:-|
            | **Status:** | ✅ Deploy successful! |
            | **Preview URL:** | ${{ steps.deploy.outputs.deployment-url }} |
            | **Branch Preview URL:** | ${{ steps.deploy.outputs.pages-deployment-alias-url }} |
          comment-tag: cf-preview-url

      - name: Deployment summary
        if: success()
        run: |
          (
            echo "### ✅ ${{ inputs.site-name }} deployed successfully"
            echo "Latest commit: '${{ steps.short-sha.outputs.short_sha }}'"
            echo ""
            echo "🔗 **URL:** ${{ steps.deploy.outputs.deployment-url }}"
            echo "🔗 **Branch Preview URL:** ${{ steps.deploy.outputs.pages-deployment-alias-url }}"
          ) >> "${GITHUB_STEP_SUMMARY}"
