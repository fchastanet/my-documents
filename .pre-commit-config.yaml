---
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit, manual]
minimum_pre_commit_version: 3.5.0
fail_fast: true
repos:
  - repo: https://github.com/fchastanet/bash-tools-framework
    rev: 6.5.0
    hooks:
      - id: rimage
        exclude: |
          (?x)(
            ^content/docs/bash-scripts/assets/bash-basic-best-practices\.webp$|
            ^content/docs/howtos/assets/dockerfile-best-practices\.webp$|
            ^content/docs/bash-scripts/assets/bats-best-practices\.webp$|
            ^content/docs/bash-scripts/assets/linux-commands-best-practices\.webp$|
            ^content/assets/my-documents-homepage\.webp$|
            ^content/docs/docker/assets/Alpine-vs-Ubuntu\.webp$|
            ^content/docs/howtos/assets/dockerfileLayersBestPractices\.webp$|
            ^content/docs/howtos/howto-write-jenkinsfile/assets/downstreamBuildView\.webp$|
            ^content/docs/howtos/howto-write-jenkinsfile/assets/JenkinsMasterSlave\.webp$|
            ^content/docs/howtos/howto-write-jenkinsfile/assets/JenkinsMasterSlaveAgents\.webp$|
            ^content/docs/howtos/howto-write-jenkinsfile/assets/snippetGenerator\.webp$|
            ^content/docs/howtos/howto-write-jenkinsfile/assets/restartFromStage\.webp$|
            ^marp/marp-demo/assets/marp-slide-example\.webp$|
            ^content/docs/howtos/howto-write-jenkinsfile/assets/JenkinsMasterSlaveAgents\.webp$|
            ^content/docs/howtos/howto-write-jenkinsfile/assets/snippetGenerator\.webp$|
            ^content/docs/howtos/howto-write-jenkinsfile/assets/restartFromStage\.webp$|
            ^content/docs/howtos/howto-write-jenkinsfile/assets/replayPipeline\.webp$|
            ^content/docs/docker/assets/dockerSection\.webp$|
            ^content/docs/howtos/assets/debugHugo\.webp$|
            ^content/docs/howtos/assets/howto-write-docker-compose\.webp$|
            ^content/docs/howtos/assets/howToSection\.webp$|
            ^content/docs/howtos/assets/saml2aws\.webp$|
            ^content/fr/assets/french\.webp$|
            ^content/fr/developpement-personnel/assets/devPerso\.webp$|
            ^marp/marp-demo/assets/marp-markdown-presentation-ecosystem\.webp$|
            ^content/fr/assets/20181031_HauntedMan\.webp$|
            ^content/fr/developpement-personnel/assets/emotions\.webp$|
            \.svg$
          )

  - repo: https://github.com/sudosubin/pre-commit-image
    rev: v0.1.2
    hooks:
      # resize image to max resolution of 800x600
      - id: image
        args: [--max-width, '1200', --max-height, '1200']
        files: \.(avif|heic|heif|jpeg|jpg|png|webp)$
        exclude: |
          (?x)(
            ^assets/favicons/|
            ^content/assets/my-documents-homepage\.webp$|
            ^content/docs/docker/assets/Alpine-vs-Ubuntu\.webp$|
            ^content/docs/howtos/howto-write-jenkinsfile/assets/downstreamBuildView\.webp$|
            ^content/fr/assets/20181031_HauntedMan\.webp$|
            ^content/fr/developpement-personnel/assets/emotions\.webp$|

          )

  - repo: https://github.com/oxipng/oxipng
    rev: v10.1.1
    hooks:
      - id: oxipng
        args: ['-o', '4', '--strip', 'safe', '--alpha']

  - repo: https://github.com/executablebooks/mdformat
    # Do this before other tools "fixing" the line endings
    rev: 0.7.22
    hooks:
      - id: mdformat
        name: Format Markdown
        entry: mdformat # Executable to run, with fixed options
        language: python
        types: [markdown]
        args: [--wrap, '120', --number]
        additional_dependencies:
          - mdformat-frontmatter
          - mdformat-toc
          - mdformat-shfmt
          - mdformat-tables
          - mdformat-config
          - mdformat-web
          - mdformat-gfm
        exclude: |
          (?x)(
            ^\.github/|
            ^_navbar\.md$|
            ^doc/ai/|
            ^archetypes/|
            ^shared/archetypes/|
            ^content/docs/bash-scripts/basic-best-practices\.md$|
            ^content/docs/howtos/saml2aws.md|
            ^content/docs/howtos/howto-write-jenkinsfile/06-annotated-jenkinsfiles--p2\.md$|
            ^content/docs/backups/happier-developers-faster-teams-why-prek-beats-pre-commit\.md$
          )

  - repo: https://github.com/jsh9/markdown-heading-numbering
    rev: 0.1.1
    hooks:
      - id: markdown-heading-numbering
        args:
          - --start-from-level=2
          - --initial-numbering=1
        exclude: |
          (?x)(
            ^\.github/|
            ^doc/ai/|
            AGENTS\.md|
            ^marp/
          )

  - repo: https://github.com/jsh9/markdown-toc-creator
    rev: 0.1.3
    hooks:
      - id: markdown-toc-creator
        args:
          - --proactive=False
          - --style=github
          - --quiet
          - --add-toc-title=False
          - --add-horizontal-rules=False
        exclude: |
          (?x)(
            ^\.github/|
            ^doc/ai/|
            AGENTS\.md|
            ^marp/
          )

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        name: Markdownlint for non-Marp files
        args: [--config=.markdownlint-pre-commit.yaml, --fix]
        exclude: |
          (?x)(
            ^\.github/|
            ^doc/ai/|
            ^content/docs/bash-scripts/basic-best-practices\.md$|
            ^content/docs/howtos/saml2aws.md|
            ^content/docs/howtos/howto-write-jenkinsfile/06-annotated-jenkinsfiles--p2\.md$|
            ^content/docs/howtos/saml2aws.md b/content/docs/howtos/saml2aws.md|
            ^marp/
          )
      - id: markdownlint
        name: Markdownlint for Marp files
        args: [--config=marp/.markdownlint.yaml, --fix]
        files: ^marp/.*\.md$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: fix-byte-order-marker
      - id: end-of-file-fixer
        exclude: |
          (?x)(
            ^.idea/.*$|
            \.svg$
          )
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-xml
      - id: check-yaml
      - id: check-added-large-files
        files: \.(avif|heic|heif|jpeg|jpg|png|webp)$
        args: [--maxkb=1024, --enforce-all]
        exclude: |
          (?x)(
            ^assets/favicons/favicon\.png$
          )
      - id: check-added-large-files
        # check for non image files larger than 100KB
        args: [--maxkb=128]
        exclude: \.(avif|heic|heif|jpeg|jpg|png|webp)$
      - id: forbid-new-submodules
      - id: check-json
        exclude: ^.vscode/.*$
      - id: file-contents-sorter
        files: .cspell/.*\.txt
        args: [--ignore-case]
        stages: [pre-commit, pre-push, manual]
      - id: trailing-whitespace

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --dictionary
          - '-'
          - --dictionary
          - .cspell/codespellrc-dic.txt
          - --ignore-words
          - .cspell/codespellrc-ignore.txt
          - --quiet-level
          - '2'
          - --interactive
          - '0'
          - --check-filenames
          - --check-hidden
          - --write-changes
        exclude: >
          (?x)(
            ^.cspell/codespellrc-.*\.txt$|
            ^.cspell/french\.txt$|
            ^package-lock\.json$|
            ^content/fr/
          )

  - repo: https://github.com/fchastanet/jumanjihouse-pre-commit-hooks
    rev: 3.0.2
    hooks:
      # Check both committed and uncommitted files for git conflict
      # markers and whitespace errors according to core.whitespace
      # and conflict-marker-size configuration in a git repo.
      - id: git-check

  - repo: https://github.com/fchastanet/bash-tools-framework
    rev: 6.5.0
    hooks:
      - id: cspellForbidden
      - id: fixShebangExecutionBit
      - id: awkLint
      - id: shellcheckLint
      - id: plantuml
        args: [--same-dir, -f, svg, --limit-size, '1200']
      - id: mermaid
      - id: hugoUpdateLastmod
        stages: [pre-commit]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        stages: [pre-commit, pre-push, manual]

  - repo: local
    hooks:
      - id: build
        name: Build this Hugo site
        language: system
        pass_filenames: false
        always_run: true
        entry: make build
        stages: [pre-commit]
